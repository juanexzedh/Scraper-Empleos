<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Resultados</title>

    <style>
        body { background: #0b1220; color: #f1f5ff; }
                .app-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); }
                .muted { color: rgba(241,245,255,0.78) !important; }
        .app-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14); }
                .table-dark-soft { --bs-table-bg: rgba(255,255,255,0.04); --bs-table-striped-bg: rgba(255,255,255,0.02); }
        .muted { color: rgba(241,245,255,0.78) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary-subtle">
        <div class="container">
            <a class="navbar-brand" href="/">Scraper Empleos</a>
            <span class="navbar-text muted">Resultados</span>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-3">
            <div>
                <h1 class="h3 mb-1">Resultados para "{{ palabra }}"</h1>
                <div class="muted">Total encontrados: <span class="fw-semibold text-light">{{ resultados|length }}</span></div>
            </div>
        </div>

        <form action="/buscar" method="GET" class="mb-4">
            <div class="input-group input-group-lg">
                <input type="text" name="q" class="form-control" value="{{ palabra }}" placeholder="Buscar tecnología..." aria-label="Buscar" />
                <button class="btn btn-primary" type="submit">Buscar</button>
            </div>
        </form>

        <div class="row g-3">
            {% if resultados|length == 0 %}
                <div class="col-12">
                    <div class="alert alert-warning" role="alert">
                        No se encontraron ofertas para "{{ palabra }}".
                    </div>
                </div>
            {% endif %}

            {% for oferta in resultados %}
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card app-card h-100">
                        <div class="card-body">
                            <div class="fw-semibold mb-2 text-light">{{ oferta[0] }}</div>
                            <div class="muted" style="font-size: 0.95rem;">{{ oferta[1] }}</div>
                            <div class="mt-3">
                                <span class="badge text-bg-secondary rounded-pill text-light">{{ oferta[2] }}</span>
                            </div>
                            <div class="mt-3">
                                <a href="{{ oferta[3] }}" target="_blank" class="btn btn-outline-primary btn-sm">
                                    Ver oferta
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
