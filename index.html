<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Empleos</title>
</head>
<body>

    <h1>Dashboard de Empleos</h1>

    <h2>Total de ofertas</h2>
    <p>{{ total }}</p>

    <h2>Salario promedio</h2>
    <p>{{ salario_promedio }}</p>

    <h2>Empresas que más contratan</h2>

    <ul>
    {% for empresa in empresas %}
        <li>{{ empresa[0] }} - {{ empresa[1] }}</li>
    {% endfor %}
    </ul>

</body>
</html>
